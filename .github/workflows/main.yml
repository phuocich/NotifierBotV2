name: Notifier Bot V2

on:
  schedule:
    - cron: '0 22 * * *'   # 5:00 AM VN
    - cron: '30 14 * * *'  # 09:30 PM VN
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Setup Google credentials
        run: |
          echo '${{ secrets.GOOGLE_TTS_CREDENTIALS }}' > key.json

      - name: Run bot
        run: dotnet run --project NotifierBotV2.csproj

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Data/state.json

          git diff --cached --quiet || git commit -m "Update verse state"
          git push
